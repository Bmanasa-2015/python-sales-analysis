name: Sales Analysis CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  sales-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sales Analysis
      run: |
        python sales-analyss.py

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: sales-report
        path: |
          reports/
          visualizations/
