name: Sales Analysis CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  sales-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sales Analysis
      run: |
        python sales-analysis.py

    - name: Verify Generated Files
      run: |
        echo "Current Directory:"
        pwd

        echo "All Files:"
        ls -R

        echo "Reports Folder:"
        ls -la reports || echo "reports folder not found"

        echo "Visualizations Folder:"
        ls -la visualizations || echo "visualizations folder not found"

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: sales-report
        path: |
          reports/**
          visualizations/**